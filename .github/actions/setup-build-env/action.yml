name: "Setup Build Environment"
description: "Install rpm-build toolchain and Zig compiler for OpenSSH static RPM builds"

inputs:
  zig-ver:
    description: "Zig toolchain version"
    required: true

runs:
  using: composite
  steps:
    - name: Install rpm-build toolchain
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          rpm rpm2cpio \
          tar xz-utils gzip coreutils curl \
          binutils file findutils cpio

    - name: Install Zig ${{ inputs.zig-ver }}
      shell: bash
      run: |
        ZIG_TAR="zig-x86_64-linux-${{ inputs.zig-ver }}.tar.xz"
        ZIG_URL="https://ziglang.org/download/${{ inputs.zig-ver }}/${ZIG_TAR}"
        if [[ -f "SOURCES/${ZIG_TAR}" ]]; then
          echo "Using cached Zig tarball from SOURCES/"
          sudo tar -xJf "SOURCES/${ZIG_TAR}" -C /usr/local/
        else
          echo "Downloading Zig ${{ inputs.zig-ver }}"
          curl -fsSL --retry 3 "${ZIG_URL}" | sudo tar -xJ -C /usr/local/
        fi
        echo "/usr/local/zig-x86_64-linux-${{ inputs.zig-ver }}" >> "$GITHUB_PATH"
        /usr/local/zig-x86_64-linux-${{ inputs.zig-ver }}/zig version
