name: Build (PR / push validation)

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]   # tags handled by release.yml
  pull_request:
    branches: [main]

# Cancel redundant runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Version pins ──────────────────────────────────────────────────────────────
env:
  OPENSSH_VER: "10.2p1"
  OPENSSL_VER: "3.6.1"
  ZLIB_VER:    "1.3.2"
  ZIG_VER:     "0.15.2"
  RPM_RELEASE: "0"   # pre-release build; official releases use release.yml

jobs:
  # ── Build matrix: x86_64 + aarch64 ─────────────────────────────────────────
  build:
    name: Build RPMs (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    steps:
      # ── 0. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── 1. Cache source tarballs ─────────────────────────────────────────────
      - name: Restore source tarball cache
        uses: actions/cache@v5
        with:
          path: SOURCES
          key: sources-${{ env.OPENSSH_VER }}-${{ env.OPENSSL_VER }}-${{ env.ZLIB_VER }}-${{ env.ZIG_VER }}
          restore-keys: |
            sources-${{ env.OPENSSH_VER }}-${{ env.OPENSSL_VER }}-${{ env.ZLIB_VER }}-

      # ── 2. Setup build environment (rpm-build + Zig) ─────────────────────────
      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          zig-ver: ${{ env.ZIG_VER }}

      # ── 3. Build RPMs ────────────────────────────────────────────────────────
      - name: Build RPMs (${{ matrix.arch }})
        run: |
          zig build rpm \
            -Dopenssh-ver=${{ env.OPENSSH_VER }} \
            -Dopenssl-ver=${{ env.OPENSSL_VER }} \
            -Dzlib-ver=${{ env.ZLIB_VER }} \
            -Dzig-ver=${{ env.ZIG_VER }} \
            -Darch=${{ matrix.arch }} \
            -Drpm-release=${{ env.RPM_RELEASE }}

      # ── 4. Verify static linkage ─────────────────────────────────────────────
      - name: Verify RPMs are fully statically linked
        run: zig build check

      # ── 5. Upload as build artifact (7-day retention for PR review) ──────────
      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rpms-${{ matrix.arch }}-pr${{ github.run_number }}
          path: output/*.rpm
          retention-days: 7
          if-no-files-found: error
