name: Build (PR / push validation)

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]   # tags handled by release.yml
  pull_request:
    branches: [main]

# Cancel redundant runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Version pins ──────────────────────────────────────────────────────────────
env:
  OPENSSH_VER: "9.9p2"
  OPENSSL_VER: "3.5.0"
  ZLIB_VER:    "1.3.1"
  ZIG_VER:     "0.15.2"
  RPM_RELEASE: "0"   # pre-release build; official releases use release.yml

jobs:
  # ── Build matrix: x86_64 + aarch64 ─────────────────────────────────────────
  build:
    name: Build RPMs (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]

    steps:
      # ── 0. Install rpm-build toolchain ──────────────────────────────────────
      - name: Install rpm-build toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            rpm rpm2cpio \
            tar xz-utils gzip coreutils curl \
            binutils file findutils cpio

      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Cache source tarballs ─────────────────────────────────────────────
      # Path covers all tarballs including the Zig host toolchain tarball.
      # On cache hit, the implicit `fetch` inside `zig build rpm` skips downloads.
      - name: Restore source tarball cache
        uses: actions/cache@v4
        with:
          path: SOURCES
          key: sources-${{ env.OPENSSH_VER }}-${{ env.OPENSSL_VER }}-${{ env.ZLIB_VER }}-${{ env.ZIG_VER }}
          restore-keys: |
            sources-${{ env.OPENSSH_VER }}-${{ env.OPENSSL_VER }}-${{ env.ZLIB_VER }}-

      # ── 3. Install Zig (for running build.zig) ───────────────────────────────
      # Uses the cached tarball from SOURCES/ if available; downloads otherwise.
      - name: Install Zig ${{ env.ZIG_VER }}
        run: |
          ZIG_TAR="zig-x86_64-linux-${ZIG_VER}.tar.xz"
          ZIG_URL="https://ziglang.org/download/${ZIG_VER}/${ZIG_TAR}"
          if [[ -f "SOURCES/${ZIG_TAR}" ]]; then
            echo "Using cached Zig tarball from SOURCES/"
            tar -xJf "SOURCES/${ZIG_TAR}" -C /usr/local/
          else
            echo "Downloading Zig ${ZIG_VER}"
            curl -fsSL --retry 3 "${ZIG_URL}" | tar -xJ -C /usr/local/
          fi
          echo "/usr/local/zig-x86_64-linux-${ZIG_VER}" >> "$GITHUB_PATH"
          /usr/local/zig-x86_64-linux-${ZIG_VER}/zig version

      # ── 4. Build RPMs ────────────────────────────────────────────────────────
      # `zig build rpm` implicitly runs `fetch` (idempotent) then builds.
      # Cache hit → fetch skips downloads; cache miss → fetch downloads all.
      - name: Build RPMs (${{ matrix.arch }})
        run: |
          zig build rpm \
            -Dopenssh-ver=${{ env.OPENSSH_VER }} \
            -Dopenssl-ver=${{ env.OPENSSL_VER }} \
            -Dzlib-ver=${{ env.ZLIB_VER }} \
            -Dzig-ver=${{ env.ZIG_VER }} \
            -Darch=${{ matrix.arch }} \
            -Drpm-release=${{ env.RPM_RELEASE }}

      # ── 5. Upload as build artifact (7-day retention for PR review) ──────────
      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.arch }}-pr${{ github.run_number }}
          path: output/*.rpm
          retention-days: 7
          if-no-files-found: error
